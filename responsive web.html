<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
}

/* Navbar */
.navbar {
  background-color: black;
  color: white;
  padding: 15px;
  text-align: center;
}

/* Layout */
.container {
  display: flex;
  flex-wrap: wrap;
}

/* Sidebar */
.sidebar {
  flex: 25%;
  background-color: lightgray;
  padding: 20px;
}

/* Main content */
.main {
  flex: 75%;
  background-color: lightblue;
  padding: 20px;
}

/* 📱 Mobile (max 600px) */
@media (max-width: 600px) {
  .container {
    flex-direction: column;
  }
}

/* 📲 Tablet (601px to 992px) */
@media (min-width: 601px) and (max-width: 992px) {
  .sidebar {
    flex: 100%;
  }
  .main {
    flex: 100%;
  }
}

/* 💻 Desktop (above 992px) */
@media (min-width: 993px) {
  .sidebar {
    flex: 25%;
  }
  .main {
    flex: 75%;
  }
}
</style>
</head>
<body>

<div class="navbar">My Responsive Page</div>

<div class="container">
  <div class="sidebar">
    <h3>Sidebar</h3>
    <p>Links or menu</p>
  </div>

  <div class="main">
    <h2>Main Content</h2>
    <p>This layout changes based on screen size.</p>
  </div>
</div>

</body>
</html>
