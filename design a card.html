<!DOCTYPE html>
<html>
<head>
    <title>Simple Card Design</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .card {
            width: 250px;
            background-color: white;

            /* Box Model */
            padding: 15px;        /* space inside */
            margin: 40px auto;   /* space outside */
            border: 2px solid #ddd;

            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .card p {
            font-size: 14px;
            color: gray;
        }

        .card button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background-color: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="\Users\carol\Downloads\WhatsApp Image 2026-04-22 at 3.09.50 PM.jpeg" alt="Card Image">
    <h3>My Card</h3>
    <p>This is a simple card using box model.</p>
    <button>Read More</button>
</div>

</body>
</html>
