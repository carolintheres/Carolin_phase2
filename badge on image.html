<!DOCTYPE html>
<html>
<head>
    <title>Badge on Image</title>
    <style>
        .container {
            position: relative;
            width: 250px;
        }

        .container img {
            width: 100%;
            border-radius: 10px;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Badge on Image</h2>

<div class="container">
    <img src="/Users\carol\Downloads\WhatsApp Image 2026-04-22 at 3.09.50 PM.jpeg" alt="Image">
    <div class="badge">New</div>
</div>

</body>
</html>
