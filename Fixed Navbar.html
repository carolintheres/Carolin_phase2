<!DOCTYPE html>
<html>
<head>
    <title>Fixed Navbar</title>
    <style>
        body {
            margin: 0;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: black;
            color: white;
            padding: 15px;
        }

        .content {
            margin-top: 70px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="navbar">
    My Website | Home | About | Contact
</div>

<div class="content">
    <h2>Scroll Down</h2>
    <p>Content goes here...</p>
    <p style="height: 1000px;">More content to enable scrolling</p>
</div>

</body>
</html>
