<!DOCTYPE html>
<html>
<head>
<style>
/* Block element */
.block {
  display: block;
  background-color: lightblue;
  margin: 10px;
  padding: 10px;
}

/* Inline element */
.inline {
  display: inline;
  background-color: lightgreen;
  padding: 5px;
}

/* Inline-block element */
.inline-block {
  display: inline-block;
  background-color: lightcoral;
  width: 120px;
  height: 50px;
  margin: 10px;
  text-align: center;
  line-height: 50px;
}

/* Hidden element */
.hidden {
  display: none;
}
</style>
</head>
<body>

<h1>Display Properties Element </h1>

<!--BLOCK-->
<h2>Block</h2>
<div class="block">Block Element 1</div>
<div class="block">Block Element 2</div>

<!--INLINE-->
<h2>Inline</h2>
<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<br><br>
<!--INLINE-BLOCK-->
<h2>Inline-block</h2>
<div class="inline-block">Box 1</div>
<div class="inline-block">Box 2</div>

<!--NONE-->
<h2>None</h2>
<p class="hidden">This text is hidden</p>

</body>
</html>
