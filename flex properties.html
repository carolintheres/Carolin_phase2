<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;              /* enable flexbox */
  flex-direction: row;        /* row / column */
  justify-content: space-around; /* horizontal spacing */
  align-items: center;        /* vertical alignment */
  height: 200px;
  background-color: #f2f2f2;
}

/* Flex items */
.box {
  background-color: lightblue;
  padding: 20px;
  margin: 10px;
  width: 80px;
  text-align: center;
}

/* Individual item properties */
.box1 {
  order: 2;        /* changes order */
}

.box2 {
  order: 1;
  flex-grow: 2;    /* takes more space */
}

.box3 {
  order: 3;
  align-self: flex-end; /* override alignment */
}
</style>
</head>
<body>

<h2>Flexbox Layout</h2>

<div class="container">
  <div class="box box1">1</div>
  <div class="box box2">2</div>
  <div class="box box3">3</div>
</div>

</body>
</html>
